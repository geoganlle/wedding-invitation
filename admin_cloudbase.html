<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>婚礼数据管理后台 - CloudBase</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700&display=swap" rel="stylesheet">
    <!-- CloudBase SDK -->
    <script src="https://js.cloudbase.net/sdk/1.0.0/cloudbase.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: "Noto Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .header {
            background: white;
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        
        .header h1 {
            color: #667eea;
            font-size: 32px;
            margin-bottom: 10px;
        }
        
        .header p {
            color: #666;
            font-size: 14px;
        }
        
        .status-info {
            background: #e3f2fd;
            padding: 15px;
            border-radius: 10px;
            margin-top: 15px;
            font-size: 13px;
        }
        
        .status-info strong {
            color: #1976d2;
        }
        
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        
        .tab {
            padding: 12px 30px;
            background: rgba(255,255,255,0.2);
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: all 0.3s;
        }
        
        .tab.active {
            background: white;
            color: #667eea;
        }
        
        .tab:hover {
            background: rgba(255,255,255,0.3);
        }
        
        .content-card {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 25px;
            border-radius: 15px;
            text-align: center;
        }
        
        .stat-number {
            font-size: 48px;
            font-weight: bold;
            display: block;
        }
        
        .stat-label {
            font-size: 14px;
            opacity: 0.9;
            margin-top: 5px;
        }
        
        .data-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        
        .data-table th,
        .data-table td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid #eee;
        }
        
        .data-table th {
            background: #f8f9fa;
            font-weight: bold;
            color: #667eea;
        }
        
        .data-table tr:hover {
            background: #f8f9fa;
        }
        
        .status-badge {
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
        }
        
        .status-attend {
            background: #d4edda;
            color: #155724;
        }
        
        .status-not-attend {
            background: #f8d7da;
            color: #721c24;
        }
        
        .status-pending {
            background: #fff3cd;
            color: #856404;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }
        
        .refresh-btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 20px;
            font-size: 14px;
            cursor: pointer;
            margin-bottom: 20px;
            transition: all 0.3s;
        }
        
        .refresh-btn:hover {
            background: #5568d3;
            transform: translateY(-2px);
        }
        
        .export-btn {
            background: #4caf50;
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 20px;
            font-size: 14px;
            cursor: pointer;
            margin-left: 10px;
            transition: all 0.3s;
        }
        
        .export-btn:hover {
            background: #45a049;
        }
        
        .wish-card {
            background: linear-gradient(135deg, #fff9c4, #fff59d);
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 15px;
            box-shadow: 0 3px 10px rgba(0,0,0,0.1);
        }
        
        .wish-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        
        .wish-author {
            font-weight: bold;
            color: #667eea;
        }
        
        .wish-date {
            font-size: 12px;
            color: #999;
        }
        
        .wish-text {
            color: #333;
            line-height: 1.6;
        }
        
        .no-data {
            text-align: center;
            padding: 40px;
            color: #999;
        }
        
        .alert {
            padding: 15px 20px;
            border-radius: 10px;
            margin-bottom: 20px;
        }
        
        .alert-warning {
            background: #fff3cd;
            color: #856404;
            border-left: 4px solid #ffc107;
        }
        
        .alert-info {
            background: #d1ecf1;
            color: #0c5460;
            border-left: 4px solid #17a2b8;
        }
        
        .alert-success {
            background: #d4edda;
            color: #155724;
            border-left: 4px solid #28a745;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>💕 婚礼数据管理后台</h1>
            <p>腾讯云 CloudBase 驱动 · 查看 RSVP 回复和宾客祝福</p>
            
            <div class="status-info">
                <strong>☁️ 环境信息：</strong><br>
                环境 ID: cloud-env-5g1kb7epc87ee1d6<br>
                数据库集合：rsvp, wishes<br>
                <strong>⚠️ 注意：</strong>请确保数据库集合权限设置为"所有用户可读写"
            </div>
        </div>
        
        <div class="tabs">
            <button class="tab active" onclick="switchTab('rsvp')">📋 RSVP 回复</button>
            <button class="tab" onclick="switchTab('wishes')">💬 祝福墙</button>
        </div>
        
        <div class="content-card" id="rsvpTab">
            <div class="alert alert-info">
                <strong>提示：</strong>数据存储在腾讯云 CloudBase，实时加载。
            </div>
            
            <button class="refresh-btn" onclick="loadRSVPData()">🔄 刷新数据</button>
            <button class="export-btn" onclick="exportRSVP()">📥 导出 CSV</button>
            
            <div class="stats">
                <div class="stat-card">
                    <span class="stat-number" id="totalRSVP">0</span>
                    <span class="stat-label">总回复数</span>
                </div>
                <div class="stat-card">
                    <span class="stat-number" id="attending">0</span>
                    <span class="stat-label">确认参加</span>
                </div>
                <div class="stat-card">
                    <span class="stat-number" id="notAttending">0</span>
                    <span class="stat-label">不参加</span>
                </div>
                <div class="stat-card">
                    <span class="stat-number" id="pending">0</span>
                    <span class="stat-label">待定</span>
                </div>
            </div>
            
            <div id="rsvpContent">
                <div class="loading">点击"刷新数据"加载 RSVP 数据</div>
            </div>
        </div>
        
        <div class="content-card" id="wishesTab" style="display: none;">
            <button class="refresh-btn" onclick="loadWishesData()">🔄 刷新数据</button>
            
            <div class="stats">
                <div class="stat-card">
                    <span class="stat-number" id="totalWishes">0</span>
                    <span class="stat-label">祝福总数</span>
                </div>
            </div>
            
            <div id="wishesContent">
                <div class="loading">点击"刷新数据"加载祝福数据</div>
            </div>
        </div>
    </div>
    
    <script>
        // CloudBase 配置
        const CLOUDBASE_CONFIG = {
            env: 'cloud-env-5g1kb7epc87ee1d6',
            anonymousAuth: true
        };
        
        let cloudbase = null;
        let db = null;
        let rsvpData = [];
        let wishesData = [];
        
        // 初始化 CloudBase
        function initCloudBase() {
            try {
                cloudbase = window.cloudbase.init({
                    env: CLOUDBASE_CONFIG.env,
                    anonymousAuth: CLOUDBASE_CONFIG.anonymousAuth
                });
                db = cloudbase.database();
                console.log('✅ CloudBase 初始化成功');
                return true;
            } catch (err) {
                console.error('❌ CloudBase 初始化失败:', err);
                alert('CloudBase 初始化失败，请检查环境 ID 是否正确');
                return false;
            }
        }
        
        // 页面加载时初始化
        window.addEventListener('load', () => {
            if (initCloudBase()) {
                loadRSVPData();
                loadWishesData();
            }
        });
        
        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.content-card').forEach(c => c.style.display = 'none');
            
            event.target.classList.add('active');
            document.getElementById(tab + 'Tab').style.display = 'block';
        }
        
        // 加载 RSVP 数据
        async function loadRSVPData() {
            const content = document.getElementById('rsvpContent');
            content.innerHTML = '<div class="loading">正在加载 RSVP 数据...</div>';
            
            try {
                const collection = db.collection('rsvp');
                const result = await collection
                    .orderBy('createTime', 'desc')
                    .limit(100)
                    .get();
                
                rsvpData = result.data || [];
                updateRSVPStats();
                displayRSVPTable();
            } catch (err) {
                console.error('加载 RSVP 失败:', err);
                content.innerHTML = `
                    <div class="alert alert-warning">
                        <strong>❌ 加载失败</strong><br>
                        错误信息：${err.message}<br><br>
                        <strong>可能原因：</strong><br>
                        1. 数据库集合 "rsvp" 不存在<br>
                        2. 数据库权限未设置（需要设置为"所有用户可读写"）<br>
                        3. 匿名登录未启用<br><br>
                        <strong>解决方法：</strong><br>
                        1. 访问 CloudBase 控制台<br>
                        2. 创建 "rsvp" 集合<br>
                        3. 设置权限为：{"read": true, "write": true}<br>
                        4. 启用匿名登录
                    </div>
                `;
            }
        }
        
        // 加载祝福数据
        async function loadWishesData() {
            const content = document.getElementById('wishesContent');
            content.innerHTML = '<div class="loading">正在加载祝福数据...</div>';
            
            try {
                const collection = db.collection('wishes');
                const result = await collection
                    .orderBy('createTime', 'desc')
                    .limit(100)
                    .get();
                
                wishesData = result.data || [];
                document.getElementById('totalWishes').textContent = wishesData.length;
                displayWishes();
            } catch (err) {
                console.error('加载祝福失败:', err);
                content.innerHTML = `
                    <div class="alert alert-warning">
                        <strong>❌ 加载失败</strong><br>
                        错误信息：${err.message}<br><br>
                        <strong>可能原因：</strong><br>
                        1. 数据库集合 "wishes" 不存在<br>
                        2. 数据库权限未设置<br><br>
                        <strong>解决方法：</strong><br>
                        1. 访问 CloudBase 控制台<br>
                        2. 创建 "wishes" 集合<br>
                        3. 设置权限为：{"read": true, "write": true}
                    </div>
                `;
            }
        }
        
        // 更新 RSVP 统计
        function updateRSVPStats() {
            const total = rsvpData.length;
            const attending = rsvpData.filter(r => r.status === '参加').length;
            const notAttending = rsvpData.filter(r => r.status === '不参加').length;
            const pending = rsvpData.filter(r => r.status === '待定').length;
            
            document.getElementById('totalRSVP').textContent = total;
            document.getElementById('attending').textContent = attending;
            document.getElementById('notAttending').textContent = notAttending;
            document.getElementById('pending').textContent = pending;
        }
        
        // 显示 RSVP 表格
        function displayRSVPTable() {
            if (rsvpData.length === 0) {
                document.getElementById('rsvpContent').innerHTML = '<div class="no-data">暂无 RSVP 数据</div>';
                return;
            }
            
            let html = `
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>姓名</th>
                            <th>手机号</th>
                            <th>状态</th>
                            <th>人数</th>
                            <th>位置</th>
                            <th>提交时间</th>
                            <th>备注</th>
                        </tr>
                    </thead>
                    <tbody>
            `;
            
            rsvpData.forEach(rsvp => {
                const statusClass = rsvp.status === '参加' ? 'status-attend' : 
                                   rsvp.status === '不参加' ? 'status-not-attend' : 'status-pending';
                
                const createTime = rsvp.createTime ? 
                    new Date(rsvp.createTime).toLocaleString('zh-CN') : '未知';
                
                html += `
                    <tr>
                        <td><strong>${rsvp.name || '-'}</strong></td>
                        <td>${rsvp.phone || '-'}</td>
                        <td><span class="status-badge ${statusClass}">${rsvp.status || '-'}</span></td>
                        <td>${rsvp.guests || 1}人</td>
                        <td>${rsvp.location || '-'}</td>
                        <td>${createTime}</td>
                        <td>${rsvp.message || '-'}</td>
                    </tr>
                `;
            });
            
            html += '</tbody></table>';
            document.getElementById('rsvpContent').innerHTML = html;
        }
        
        // 显示祝福列表
        function displayWishes() {
            if (wishesData.length === 0) {
                document.getElementById('wishesContent').innerHTML = '<div class="no-data">暂无祝福数据</div>';
                return;
            }
            
            let html = '';
            wishesData.forEach(wish => {
                const createTime = wish.createTime ? 
                    new Date(wish.createTime).toLocaleString('zh-CN') : '未知';
                
                html += `
                    <div class="wish-card">
                        <div class="wish-header">
                            <span class="wish-author">💕 ${wish.name || '匿名'}</span>
                            <span class="wish-date">${createTime}</span>
                        </div>
                        <div class="wish-text">${wish.text || ''}</div>
                    </div>
                `;
            });
            
            document.getElementById('wishesContent').innerHTML = html;
        }
        
        // 导出 CSV
        function exportRSVP() {
            if (rsvpData.length === 0) {
                alert('暂无数据可导出');
                return;
            }
            
            let csv = '姓名，手机号，状态，人数，位置，备注，提交时间\n';
            
            rsvpData.forEach(rsvp => {
                const createTime = rsvp.createTime ? 
                    new Date(rsvp.createTime).toLocaleString('zh-CN') : '';
                
                csv += `"${rsvp.name || ''}","${rsvp.phone || ''}","${rsvp.status || ''}",` +
                       `"${rsvp.guests || 1}","${rsvp.location || ''}","${rsvp.message || ''}","${createTime}"\n`;
            });
            
            const blob = new Blob(['\ufeff' + csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `婚礼 RSVP 数据_${new Date().toISOString().split('T')[0]}.csv`;
            link.click();
        }
    </script>
</body>
</html>
