<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>婚礼数据管理后台</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: "Noto Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .header {
            background: white;
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        
        .header h1 {
            color: #667eea;
            font-size: 32px;
            margin-bottom: 10px;
        }
        
        .header p {
            color: #666;
            font-size: 14px;
        }
        
        .config-section {
            background: rgba(255,255,255,0.1);
            padding: 20px;
            border-radius: 15px;
            margin-top: 20px;
        }
        
        .config-section h3 {
            color: white;
            margin-bottom: 15px;
            font-size: 18px;
        }
        
        .config-input {
            width: 100%;
            padding: 12px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 10px;
            font-size: 14px;
            background: rgba(255,255,255,0.9);
            margin-bottom: 15px;
        }
        
        .config-btn {
            background: #4caf50;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .config-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        
        .tab {
            padding: 12px 30px;
            background: rgba(255,255,255,0.2);
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: all 0.3s;
        }
        
        .tab.active {
            background: white;
            color: #667eea;
        }
        
        .tab:hover {
            background: rgba(255,255,255,0.3);
        }
        
        .content-card {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 25px;
            border-radius: 15px;
            text-align: center;
        }
        
        .stat-number {
            font-size: 48px;
            font-weight: bold;
            display: block;
        }
        
        .stat-label {
            font-size: 14px;
            opacity: 0.9;
            margin-top: 5px;
        }
        
        .data-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        
        .data-table th,
        .data-table td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid #eee;
        }
        
        .data-table th {
            background: #f8f9fa;
            font-weight: bold;
            color: #667eea;
        }
        
        .data-table tr:hover {
            background: #f8f9fa;
        }
        
        .status-badge {
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
        }
        
        .status-attend {
            background: #d4edda;
            color: #155724;
        }
        
        .status-not-attend {
            background: #f8d7da;
            color: #721c24;
        }
        
        .status-pending {
            background: #fff3cd;
            color: #856404;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }
        
        .refresh-btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 20px;
            font-size: 14px;
            cursor: pointer;
            margin-bottom: 20px;
            transition: all 0.3s;
        }
        
        .refresh-btn:hover {
            background: #5568d3;
            transform: translateY(-2px);
        }
        
        .export-btn {
            background: #4caf50;
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 20px;
            font-size: 14px;
            cursor: pointer;
            margin-left: 10px;
            transition: all 0.3s;
        }
        
        .export-btn:hover {
            background: #45a049;
        }
        
        .wish-card {
            background: linear-gradient(135deg, #fff9c4, #fff59d);
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 15px;
            box-shadow: 0 3px 10px rgba(0,0,0,0.1);
        }
        
        .wish-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        
        .wish-author {
            font-weight: bold;
            color: #667eea;
        }
        
        .wish-date {
            font-size: 12px;
            color: #999;
        }
        
        .wish-text {
            color: #333;
            line-height: 1.6;
        }
        
        .no-data {
            text-align: center;
            padding: 40px;
            color: #999;
        }
        
        .alert {
            padding: 15px 20px;
            border-radius: 10px;
            margin-bottom: 20px;
        }
        
        .alert-warning {
            background: #fff3cd;
            color: #856404;
            border-left: 4px solid #ffc107;
        }
        
        .alert-info {
            background: #d1ecf1;
            color: #0c5460;
            border-left: 4px solid #17a2b8;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>💕 婚礼数据管理后台</h1>
            <p>查看 RSVP 回复和宾客祝福</p>
            
            <div class="config-section">
                <h3>⚙️ GitHub 配置</h3>
                <div class="alert alert-info">
                    <strong>提示：</strong>输入 GitHub Token 以加载数据。Token 仅存储在本地，不会上传。
                </div>
                <input type="password" class="config-input" id="githubToken" placeholder="输入 GitHub Token (需要 repo 或 public_repo 权限)">
                <button class="config-btn" onclick="saveConfig()">💾 保存并加载数据</button>
                <p style="margin-top: 15px; color: rgba(255,255,255,0.8); font-size: 13px;">
                    👉 <a href="https://github.com/settings/tokens" target="_blank" style="color: white;">点击创建 Token</a>
                </p>
            </div>
        </div>
        
        <div class="tabs">
            <button class="tab active" onclick="switchTab('rsvp')">📋 RSVP 回复</button>
            <button class="tab" onclick="switchTab('wishes')">💬 祝福墙</button>
        </div>
        
        <div class="content-card" id="rsvpTab">
            <div class="alert alert-warning">
                <strong>注意：</strong>数据来源于 GitHub Issues，首次加载可能需要几秒钟。
            </div>
            
            <button class="refresh-btn" onclick="loadRSVPData()">🔄 刷新数据</button>
            <button class="export-btn" onclick="exportRSVP()">📥 导出 CSV</button>
            
            <div class="stats">
                <div class="stat-card">
                    <span class="stat-number" id="totalRSVP">0</span>
                    <span class="stat-label">总回复数</span>
                </div>
                <div class="stat-card">
                    <span class="stat-number" id="attending">0</span>
                    <span class="stat-label">确认参加</span>
                </div>
                <div class="stat-card">
                    <span class="stat-number" id="notAttending">0</span>
                    <span class="stat-label">不参加</span>
                </div>
                <div class="stat-card">
                    <span class="stat-number" id="pending">0</span>
                    <span class="stat-label">待定</span>
                </div>
            </div>
            
            <div id="rsvpContent">
                <div class="loading">请点击"保存并加载数据"按钮加载 RSVP 数据</div>
            </div>
        </div>
        
        <div class="content-card" id="wishesTab" style="display: none;">
            <button class="refresh-btn" onclick="loadWishesData()">🔄 刷新数据</button>
            
            <div class="stats">
                <div class="stat-card">
                    <span class="stat-number" id="totalWishes">0</span>
                    <span class="stat-label">祝福总数</span>
                </div>
            </div>
            
            <div id="wishesContent">
                <div class="loading">请点击"保存并加载数据"按钮加载祝福数据</div>
            </div>
        </div>
    </div>
    
    <script>
        const GITHUB_OWNER = 'geoganlle';
        const GITHUB_REPO = 'wedding-invitation';
        const ISSUE_LABEL_RSRP = 'RSVP';
        const ISSUE_LABEL_WISH = 'WISH';
        
        let githubToken = localStorage.getItem('adminGithubToken') || '';
        let rsvpData = [];
        let wishesData = [];
        
        // 初始化
        window.addEventListener('load', () => {
            if (githubToken) {
                document.getElementById('githubToken').value = githubToken;
                loadData();
            }
        });
        
        function saveConfig() {
            const token = document.getElementById('githubToken').value.trim();
            if (!token) {
                alert('请输入 GitHub Token！');
                return;
            }
            
            githubToken = token;
            localStorage.setItem('adminGithubToken', token);
            alert('✅ 配置已保存！正在加载数据...');
            loadData();
        }
        
        function loadData() {
            loadRSVPData();
            loadWishesData();
        }
        
        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.content-card').forEach(c => c.style.display = 'none');
            
            event.target.classList.add('active');
            document.getElementById(tab + 'Tab').style.display = 'block';
        }
        
        async function fetchGitHubIssues(labels) {
            if (!githubToken) {
                alert('请先配置 GitHub Token！');
                return [];
            }
            
            try {
                const labelParam = labels.map(l => `label=${encodeURIComponent(l)}`).join('&');
                const response = await fetch(`https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/issues?${labelParam}&state=all&per_page=100`, {
                    headers: {
                        'Authorization': `token ${githubToken}`,
                    }
                });
                
                if (response.ok) {
                    return await response.json();
                } else {
                    const error = await response.json();
                    alert(`加载失败：${error.message}`);
                    return [];
                }
            } catch (error) {
                console.error('网络错误:', error);
                alert('网络错误，请检查网络连接');
                return [];
            }
        }
        
        async function loadRSVPData() {
            const content = document.getElementById('rsvpContent');
            content.innerHTML = '<div class="loading">正在加载 RSVP 数据...</div>';
            
            const issues = await fetchGitHubIssues([ISSUE_LABEL_RSRP]);
            rsvpData = issues;
            
            if (issues.length === 0) {
                content.innerHTML = '<div class="no-data">暂无 RSVP 数据</div>';
                updateRSVPStats();
                return;
            }
            
            // 解析 RSVP 数据
            const parsed = issues.map(issue => {
                const body = issue.body;
                const name = extractField(body, '姓名');
                const phone = extractField(body, '手机号');
                const status = extractField(body, '出席状态');
                const guests = extractField(body, '同行人数');
                const location = extractField(body, '位置');
                const message = extractField(body, '备注');
                const createdAt = new Date(issue.created_at).toLocaleString('zh-CN');
                
                return { name, phone, status, guests, location, message, createdAt, issue };
            });
            
            // 更新统计
            updateRSVPStats(parsed);
            
            // 显示表格
            let html = `
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>姓名</th>
                            <th>手机号</th>
                            <th>状态</th>
                            <th>人数</th>
                            <th>位置</th>
                            <th>提交时间</th>
                            <th>备注</th>
                        </tr>
                    </thead>
                    <tbody>
            `;
            
            parsed.forEach(rsvp => {
                const statusClass = rsvp.status === '参加' ? 'status-attend' : 
                                   rsvp.status === '不参加' ? 'status-not-attend' : 'status-pending';
                
                html += `
                    <tr>
                        <td><strong>${rsvp.name}</strong></td>
                        <td>${rsvp.phone}</td>
                        <td><span class="status-badge ${statusClass}">${rsvp.status}</span></td>
                        <td>${rsvp.guests}人</td>
                        <td>${rsvp.location}</td>
                        <td>${rsvp.createdAt}</td>
                        <td>${rsvp.message || '-'}</td>
                    </tr>
                `;
            });
            
            html += '</tbody></table>';
            content.innerHTML = html;
        }
        
        async function loadWishesData() {
            const content = document.getElementById('wishesContent');
            content.innerHTML = '<div class="loading">正在加载祝福数据...</div>';
            
            const issues = await fetchGitHubIssues([ISSUE_LABEL_WISH]);
            wishesData = issues;
            
            if (issues.length === 0) {
                content.innerHTML = '<div class="no-data">暂无祝福数据</div>';
                document.getElementById('totalWishes').textContent = '0';
                return;
            }
            
            document.getElementById('totalWishes').textContent = issues.length;
            
            let html = '';
            issues.forEach(issue => {
                const body = issue.body;
                const name = extractField(body, '祝福者') || issue.user.login;
                const text = extractField(body, '祝福内容') || body;
                const createdAt = new Date(issue.created_at).toLocaleString('zh-CN');
                
                html += `
                    <div class="wish-card">
                        <div class="wish-header">
                            <span class="wish-author">💕 ${name}</span>
                            <span class="wish-date">${createdAt}</span>
                        </div>
                        <div class="wish-text">${text}</div>
                    </div>
                `;
            });
            
            content.innerHTML = html;
        }
        
        function extractField(body, fieldName) {
            const regex = new RegExp(`\\*\\*${fieldName}\\*\\*: (.+?)(?:\\n|$)`, 'i');
            const match = body.match(regex);
            return match ? match[1].trim() : '';
        }
        
        function updateRSVPStats(parsed = rsvpData) {
            const total = parsed.length;
            const attending = parsed.filter(r => r.status === '参加').length;
            const notAttending = parsed.filter(r => r.status === '不参加').length;
            const pending = parsed.filter(r => r.status === '待定').length;
            
            document.getElementById('totalRSVP').textContent = total;
            document.getElementById('attending').textContent = attending;
            document.getElementById('notAttending').textContent = notAttending;
            document.getElementById('pending').textContent = pending;
        }
        
        function exportRSVP() {
            if (rsvpData.length === 0) {
                alert('暂无数据可导出');
                return;
            }
            
            let csv = '姓名，手机号，状态，人数，位置，备注，提交时间\n';
            
            rsvpData.forEach(rsvp => {
                const body = rsvp.body;
                const name = extractField(body, '姓名');
                const phone = extractField(body, '手机号');
                const status = extractField(body, '出席状态');
                const guests = extractField(body, '同行人数');
                const location = extractField(body, '位置');
                const message = extractField(body, '备注') || '';
                const createdAt = new Date(rsvp.created_at).toLocaleString('zh-CN');
                
                csv += `"${name}","${phone}","${status}","${guests}","${location}","${message}","${createdAt}"\n`;
            });
            
            const blob = new Blob(['\ufeff' + csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `婚礼 RSVP 数据_${new Date().toISOString().split('T')[0]}.csv`;
            link.click();
        }
    </script>
</body>
</html>
